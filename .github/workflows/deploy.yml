name: Uitrollen naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Eén uitrol tegelijk; een nieuwe push mag een lopende niet halverwege afbreken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bouw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # URL van de Cloudflare Worker; zonder deze waarde valt de app terug
          # op /api/resultaten, dat alleen tijdens ontwikkeling bestaat.
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  uitrollen:
    needs: bouw
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.uitrol.outputs.page_url }}
    steps:
      - id: uitrol
        uses: actions/deploy-pages@v4
